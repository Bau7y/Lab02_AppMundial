<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dashboard del Fanático — Mundial 2026. Tu equipo favorito con datos y colores personalizados.">
  <title>Dashboard del Fanático — Mundial 2026</title>

  <link rel="stylesheet" href="../assets/css/styles.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/pages/dashboard.css">
</head>
<body>

  <!-- Elementos globales requeridos por ui.js -->
  <div id="modal_overlay" class="modal_overlay" hidden></div>
  <div id="modal_sesion" class="modal_sesion" hidden role="dialog" aria-modal="false" aria-labelledby="modal_sesion_titulo">
    <span class="modal_sesion_icono" aria-hidden="true">🔒</span>
    <h2 id="modal_sesion_titulo">Sesión expirada</h2>
    <p>Tu sesión ha expirado. Volvé a conectarte para continuar.</p>
    <div class="modal_sesion_acciones">
      <button id="btn_reautenticar" class="btn btn_primary">Volver a conectar</button>
    </div>
  </div>

  <div id="banner_cache" class="banner_cache" hidden role="status" aria-live="polite">
    <span class="banner_cache_icono" aria-hidden="true">⚠️</span>
    <p>Mostrando datos no actualizados (sin conexión)</p>
  </div>

  <div id="banner_countdown" class="banner_countdown" hidden role="status" aria-live="polite">
    <span class="banner_countdown_icono" aria-hidden="true">⏳</span>
    <span id="texto_countdown" class="texto_countdown"></span>
  </div>

  <nav-bar></nav-bar>

  <main id="main-content">
    <section class="section" aria-labelledby="dashboard-titulo">
      <div class="container">

        <header class="section_header">
          <span class="section_badge">Dashboard</span>
          <h1 id="dashboard-titulo">Dashboard del Fanático</h1>
          <p>
            Elegí tu equipo favorito. El dashboard se adapta a sus colores
            y tu selección se guarda para la próxima visita.
          </p>
        </header>

        <!-- Selector de equipo favorito -->
        <div class="selector_equipo_wrap">
          <label for="selector_equipo" class="selector_equipo_label">
            Tu equipo favorito
          </label>
          <select
            id="selector_equipo"
            class="selector_equipo"
            aria-label="Seleccioná tu equipo favorito del Mundial 2026"
          >
            <option value="">Cargando equipos...</option>
          </select>
        </div>

        <!-- Layout dashboard: contenido principal + lateral -->
        <div class="dashboard_layout">

          <!-- Contenido principal -->
          <div>

            <!-- Header del equipo (repintado con colores del equipo) -->
            <div id="dashboard_header" class="dashboard_header" aria-live="polite">
              <!-- Renderizado por dashboard.js -->
            </div>

            <!-- Grid de estadísticas -->
            <div
              id="contenedor_dashboard"
              class="dashboard_stats_grid"
              aria-live="polite"
              aria-label="Estadísticas del equipo favorito"
            >
              <!-- Renderizado por dashboard.js -->
            </div>

          </div>

          <!-- Lateral: tabla de posición del grupo -->
          <div class="dashboard_lateral">

            <div
              id="contenedor_grupo"
              class="posicion_grupo_wrap"
              aria-live="polite"
              aria-label="Posición en el grupo"
            >
              <!-- Renderizado por dashboard.js -->
            </div>

          </div>

        </div>

        <!-- Partidos del equipo -->
        <div
          id="contenedor_partidos_equipo"
          aria-live="polite"
          aria-label="Partidos del equipo favorito"
          style="margin-top: var(--spacing_lg);"
        >
          <!-- Renderizado por dashboard.js -->
        </div>

      </div>
    </section>
  </main>

  <site-footer></site-footer>

  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/pages/dashboard.js"></script>

</body>
</html>
